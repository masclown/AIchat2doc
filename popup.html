<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIchat2doc 设置</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <svg class="header-icon" viewBox="0 0 24 24" width="20" height="20">
        <path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.61 3.61 0 0112 15.6z" fill="currentColor"/>
      </svg>
      <h1>AIchat2doc 设置</h1>
    </div>

    <!-- ===== Obsidian 库名称 ===== -->
    <div class="setting-group">
      <label class="setting-label" for="vaultName">
        <svg class="label-icon" viewBox="0 0 16 16" width="14" height="14">
          <path d="M2 2v12h10V2H2zm1 1h8v10H3V3zm1 2v1h6V5H4zm0 2v1h6V7H4zm0 2v1h4V9H4z" fill="currentColor"/>
        </svg>
        Obsidian 库名称
      </label>
      <input type="text" id="vaultName" class="setting-input" placeholder="例如：Obsidian" spellcheck="false">
      <p class="setting-hint">对应 Obsidian 中打开的 Vault 名称</p>
    </div>

    <div class="section-divider"></div>

    <!-- ===== 文件名设置 ===== -->
    <div class="section-title">
      <svg class="label-icon" viewBox="0 0 16 16" width="14" height="14">
        <path d="M14 4.5V14a2 2 0 01-2 2H4a2 2 0 01-2-2V2a2 2 0 012-2h5.5L14 4.5zM9 4V1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V5H10a1 1 0 01-1-1z" fill="currentColor"/>
      </svg>
      文件名设置
    </div>

    <!-- 文件名模式选择 -->
    <div class="setting-group">
      <label class="setting-label" for="fileNameMode">命名模式</label>
      <select id="fileNameMode" class="setting-select">
        <option value="combined">组合模式（分别设置各部分）</option>
        <option value="template">模板模式（完全自定义）</option>
      </select>
    </div>

    <!-- 组合模式设置 -->
    <div id="combinedSettings">
      <div class="setting-group">
        <label class="setting-label" for="timestampFormat">时间戳格式</label>
        <select id="timestampFormat" class="setting-select">
          <option value="14">14 位（YYYYMMDDHHmmss）</option>
          <option value="12">12 位（YYYYMMDDHHmm）— 默认</option>
          <option value="8">8 位（YYYYMMDD）</option>
          <option value="none">不使用时间戳</option>
        </select>
      </div>

      <div class="setting-group">
        <label class="setting-label" for="separator">连词符</label>
        <select id="separator" class="setting-select">
          <option value="-">横杠（-）— 默认</option>
          <option value="_">下划线（_）</option>
          <option value=" ">空格</option>
          <option value="">无连词符</option>
        </select>
      </div>

      <div class="setting-group">
        <label class="setting-label" for="sourceMode">来源名称</label>
        <select id="sourceMode" class="setting-select">
          <option value="default">默认（AI 平台名称 + "对话记录"）</option>
          <option value="custom">自定义</option>
        </select>
      </div>

      <div class="setting-group" id="customSourceGroup" style="display: none;">
        <input type="text" id="customSource" class="setting-input" placeholder="例如：我的笔记" spellcheck="false">
        <p class="setting-hint">替换默认的"Gemini对话记录"等来源名称</p>
      </div>
    </div>

    <!-- 模板模式设置 -->
    <div id="templateSettings" style="display: none;">
      <div class="setting-group">
        <label class="setting-label" for="fileNameTemplate">文件名模板</label>
        <input type="text" id="fileNameTemplate" class="setting-input" placeholder="{YYYY}{MM}{DD}{HH}{mm}-{source}对话记录" spellcheck="false">
        <p class="setting-hint">支持变量：{YYYY} {MM} {DD} {HH} {mm} {ss} {source}</p>
      </div>
    </div>

    <!-- 文件名预览 -->
    <div class="preview-box">
      <span class="preview-label">预览：</span>
      <span id="fileNamePreview" class="preview-text">202603240809-Gemini对话记录</span>
    </div>

    <!-- ===== 保存按钮 ===== -->
    <div class="button-group">
      <button id="saveBtn" class="save-btn">
        <svg viewBox="0 0 16 16" width="14" height="14">
          <path d="M13.78 4.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0L2.22 9.28a.75.75 0 011.06-1.06L6 10.94l6.72-6.72a.75.75 0 011.06 0z" fill="currentColor"/>
        </svg>
        保存设置
      </button>
    </div>

    <div id="statusMsg" class="status-msg hidden"></div>

    <div class="popup-footer">
      <span class="version-info">v0.0.19</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
